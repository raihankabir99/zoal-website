<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zai</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }

        /* Navbar */
        .navbar {
            background-color: #000000;
            padding: 10px 40px;
            display: flex;
            align-items: center;
        }
        .navbar-logo {
            height: 56px; /* Desktop height */
        }

        /* Hero Section */
        .hero {
            background-color: #1a1a1a;
            color: #fff;
            padding: 80px 40px;
            text-align: center;
        }
        .hero h1 {
            font-size: 3em;
            margin: 0;
            font-weight: 600;
        }
        .hero p {
            font-size: 1.2em;
            margin-top: 10px;
        }

        /* Main Content */
        main {
            padding: 20px;
        }

        /* Footer */
        .footer {
            background-color: #000000;
            color: #fff;
            padding: 20px 40px;
            text-align: center;
            font-size: 0.9em;
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            .navbar {
               padding: 10px 20px;
            }
            .navbar-logo {
                height: 44px; /* Mobile height */
            }
            .hero {
                padding: 60px 20px;
            }
            .hero h1 {
                font-size: 2.2em;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <img src="logo.png" alt="Zai Logo" class="navbar-logo">
    </header>

    <section class="hero">
        <h1>Experience Luxury and Precision</h1>
        <p>Discover the new standard of excellence.</p>
    </section>

    <main>
        <h2>Welcome to our Official Website</h2>
        <p>This is where your journey begins.</p>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Zai. All Rights Reserved.</p>
    </footer>

</body>
</html>
