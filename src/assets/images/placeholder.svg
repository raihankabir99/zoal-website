<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0a0a0a"/>
  <!-- Luxury Golden Border -->
  <rect x="25" y="25" width="750" height="750" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.25"/>
  <rect x="35" y="35" width="730" height="730" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Subtle background branding element -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.12"/>
  
  <!-- Centered Artistic Motif representing quality -->
  <g transform="translate(400, 400)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
    <!-- Quad geometric lines -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#D4AF37" stroke-width="0.75" opacity="0.5"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#D4AF37" stroke-width="0.75" opacity="0.5"/>
    
    <!-- Diamonds on axes -->
    <path d="M 0 -60 L 5 -55 L 0 -50 L -5 -55 Z" fill="#D4AF37" opacity="0.8"/>
    <path d="M 0 50 L 5 55 L 0 60 L -5 55 Z" fill="#D4AF37" opacity="0.8"/>
    <path d="M -60 0 L -55 -5 L -50 0 L -55 5 Z" fill="#D4AF37" opacity="0.8"/>
    <path d="M 50 0 L 55 -5 L 60 0 L 55 5 Z" fill="#D4AF37" opacity="0.8"/>
  </g>

  <!-- Typography -->
  <text x="50%" y="540" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="20" fill="#D4AF37" letter-spacing="6" text-anchor="middle" font-weight="600" opacity="0.85">ZOAL LUXURY ASSET</text>
  <text x="50%" y="575" font-family="'JetBrains Mono', monospace" font-size="10" fill="#71717a" letter-spacing="3" text-anchor="middle" opacity="0.7">STANDBY FOR IMAGE INSTANTIATION</text>
  <text x="50%" y="600" font-family="'Inter', sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle" opacity="0.4">Central Image Management System</text>
</svg>
